<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Týmová vrba SR&BI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body,#root{font-family:'Inter',system-ui,sans-serif;}
:root{
  --cs-blue:#0065BD;--cs-blue-dark:#004F9F;--cs-blue-light:#E8F1FA;--cs-blue-mid:#B3D0ED;
  --cs-red:#E2001A;--cs-red-light:#FDEAEA;
  --cs-green:#16A34A;--cs-green-light:#F0FDF4;--cs-green-mid:#BBF7D0;
  --text-primary:#1A1A2E;--text-secondary:#4A5568;--text-muted:#94A3B8;
  --border:#DDE4ED;--bg-page:#F0F4F9;--bg-white:#FFFFFF;
}
.root{background:var(--bg-page);min-height:100vh;padding:16px 12px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;flex-wrap:wrap;}
.header-sticky{position:sticky;top:0;z-index:100;background:var(--bg-page);padding-bottom:6px;margin-bottom:6px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:38px;height:38px;border-radius:10px;background:var(--cs-blue);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-name{font-size:16px;font-weight:700;color:var(--text-primary);}
.nav-row{display:flex;align-items:center;gap:6px;}
.nav-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg-white);color:var(--text-secondary);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.nav-btn:hover{background:var(--cs-blue-light);color:var(--cs-blue);}
.month-label{font-size:15px;font-weight:700;min-width:130px;text-align:center;color:var(--text-primary);}
.today-btn{padding:0 12px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg-white);color:var(--text-secondary);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.today-btn:hover{background:var(--cs-blue-light);color:var(--cs-blue);}
.user-pill{display:flex;align-items:center;gap:7px;padding:5px 11px 5px 7px;border-radius:20px;background:var(--bg-white);border:1px solid var(--border);}
.user-name{font-size:13px;font-weight:600;color:var(--text-primary);}
.logout-btn{border:none;background:none;cursor:pointer;color:var(--text-muted);font-size:13px;padding:0;}
.mode-switch{display:flex;gap:4px;background:var(--bg-white);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:14px;}
.mode-switch-btn{flex:1;padding:8px 16px;border-radius:9px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;color:var(--text-muted);background:transparent;}
.mode-switch-btn.active{background:var(--cs-blue);color:#fff;box-shadow:0 2px 8px rgba(0,101,189,0.3);}
.legend{display:flex;gap:12px;margin-bottom:12px;font-size:11px;color:var(--text-muted);flex-wrap:wrap;align-items:center;}
.legend-dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:4px;flex-shrink:0;}
.status{margin-left:auto;font-size:11px;color:var(--cs-blue);font-weight:600;}
.day-headers{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;}
.day-hdr{text-align:center;font-size:10px;font-weight:700;color:var(--text-muted);padding:5px 0;letter-spacing:0.7px;text-transform:uppercase;}
.day-hdr.we{color:var(--cs-blue-mid);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cell{min-height:80px;border-radius:10px;padding:6px;cursor:pointer;transition:all 0.15s;position:relative;background:var(--bg-white);border:1.5px solid var(--border);user-select:none;}
.cell.weekend{background:var(--cs-blue-light);border-color:var(--cs-blue-mid);}
.cell.holiday{background:var(--cs-red-light);border-color:#F5B8BF;}
.cell.today{border:2px solid var(--cs-blue);box-shadow:0 0 0 3px rgba(0,101,189,0.12);}
.cell.selected{border:2px solid var(--cs-blue);box-shadow:0 0 0 3px rgba(0,101,189,0.2);background:var(--cs-blue-light) !important;}
.cell.uncovered{border-color:#F97316;}
.cell.past{opacity:0.45;filter:grayscale(30%);}
.cell:hover{box-shadow:0 4px 14px rgba(0,101,189,0.15);border-color:var(--cs-blue-mid);transform:translateY(-1px);}
.cell-top{display:flex;align-items:center;gap:3px;margin-bottom:3px;}
.cell-num{font-size:12px;font-weight:600;color:var(--text-muted);}
.cell-num.tn{color:var(--cs-blue);font-weight:700;}
.cell-num.hn{color:var(--cs-red);}
.cell-num.wn{color:var(--cs-blue);}
.sv-badge{font-size:8px;font-weight:700;color:var(--cs-red);background:var(--cs-red-light);padding:1px 4px;border-radius:4px;margin-left:auto;}
.sel-check{width:14px;height:14px;background:var(--cs-blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:700;margin-left:auto;flex-shrink:0;}
.cell-svc{display:flex;align-items:center;gap:3px;margin-bottom:2px;}
.cell-svc-name{font-size:11px;font-weight:700;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cell-empty{font-size:9px;color:#CBD5E1;font-style:italic;}
.cell-backup-name{font-size:9px;font-weight:600;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cell-note{font-size:9px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px;}
.sel-toolbar{display:flex;align-items:center;gap:10px;background:var(--cs-blue);color:#fff;border-radius:12px;padding:10px 16px;flex-wrap:wrap;animation:slideIn 0.2s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.sel-info{font-size:13px;font-weight:600;flex:1;}
.sel-hint{font-size:11px;opacity:0.75;}
.sel-act-btn{padding:6px 14px;border-radius:8px;border:1.5px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.15);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.sel-act-btn:disabled{opacity:0.4;cursor:default;}
.sel-cancel-btn{padding:6px 12px;border-radius:8px;border:none;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);font-size:12px;cursor:pointer;font-family:inherit;}
.abs-wrap{border-radius:12px;border:1px solid var(--border);background:var(--bg-white);overflow:hidden;display:flex;flex-direction:column;max-height:calc(100vh - 200px);}
.abs-scroll{overflow-y:auto;overflow-x:auto;flex:1;}
.abs-table{border-collapse:collapse;min-width:100%;}
.abs-table th,.abs-table td{border:1px solid var(--border);}
.abs-table thead{position:sticky;top:0;z-index:4;}
.abs-th-day{min-width:58px;width:58px;padding:5px 4px;text-align:center;background:#F8FAFC;position:sticky;left:0;z-index:5;border-right:2px solid var(--cs-blue-mid);font-size:10px;font-weight:700;color:var(--text-muted);}
.abs-td-day{padding:4px 4px;background:#F8FAFC;position:sticky;left:0;z-index:2;border-right:2px solid var(--cs-blue-mid);min-width:58px;width:58px;vertical-align:middle;}
.abs-td-day.today-r{background:var(--cs-blue-light)!important;}
.abs-td-day.weekend-r{background:#F0F4F9;}
.abs-td-day.holiday-r{background:var(--cs-red-light);}
.abs-td-day.past-r{opacity:0.55;}
.abs-th-member{min-width:76px;max-width:76px;width:76px;padding:5px 3px;text-align:center;background:#F8FAFC;}
.abs-member-td{min-width:76px;max-width:76px;width:76px;padding:0;cursor:default;vertical-align:top;}
.abs-member-td.today-r{background:#F0F7FF;}
.abs-member-td.weekend-r{background:#F5F8FC;}
.abs-member-td.holiday-r{background:#FFF5F5;}
.abs-member-td.past-r{opacity:0.55;}
.abs-half{display:flex;min-height:39px;padding:3px 4px;cursor:pointer;transition:background 0.1s;align-items:center;justify-content:center;overflow:hidden;}
.abs-half:hover{background:var(--cs-blue-light);}
.abs-half.am{border-bottom:1px dashed var(--border);}
.abs-badge{display:inline-flex;align-items:center;gap:2px;padding:1px 4px;border-radius:4px;font-size:9px;font-weight:700;white-space:nowrap;line-height:1.4;overflow:hidden;max-width:70px;}
.half-label{font-size:8px;color:var(--text-muted);font-weight:600;}
.abs-day-card{border-radius:12px;background:var(--bg-white);border:1px solid var(--border);overflow:hidden;margin-bottom:8px;}
.abs-day-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);}
.abs-day-header.today-r{background:var(--cs-blue-light);}
.abs-day-header.weekend-r{background:var(--cs-blue-light);}
.abs-day-header.holiday-r{background:var(--cs-red-light);}
.abs-day-header.past-r{opacity:0.6;}
.abs-member-row{display:flex;align-items:stretch;border-bottom:1px solid #F0F4F9;}
.abs-member-row:last-child{border-bottom:none;}
.abs-member-row.past-r{opacity:0.6;}
.abs-member-info{display:flex;align-items:center;gap:8px;padding:8px 14px;min-width:120px;border-right:1px solid var(--border);}
.abs-halves{display:flex;flex-direction:column;flex:1;}
.abs-half-mob{display:flex;align-items:center;gap:6px;padding:5px 10px;cursor:pointer;flex:1;transition:background 0.1s;}
.abs-half-mob:hover{background:var(--cs-blue-light);}
.abs-half-mob.am-mob{border-bottom:1px dashed var(--border);}
.abs-half-label{font-size:10px;font-weight:700;color:var(--text-muted);min-width:24px;}
.overlay{position:fixed;inset:0;background:rgba(10,20,50,0.45);display:flex;align-items:flex-end;justify-content:center;z-index:999;backdrop-filter:blur(3px);}
@media(min-width:600px){.overlay{align-items:center;}}
.modal{background:var(--bg-white);border-radius:20px 20px 0 0;padding:20px 20px 28px;width:100%;max-width:500px;color:var(--text-primary);max-height:92vh;overflow-y:auto;}
@media(min-width:600px){.modal{border-radius:16px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.12);}}
.modal-drag{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 18px;}
@media(min-width:600px){.modal-drag{display:none;}}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.modal-date{font-size:19px;font-weight:700;margin-bottom:6px;}
.modal-date-sub{font-size:12px;color:var(--text-muted);margin-top:4px;line-height:1.6;}
.type-badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.type-badge.holiday{background:var(--cs-red-light);color:var(--cs-red);border:1px solid #F5B8BF;}
.type-badge.weekend{background:var(--cs-blue-light);color:var(--cs-blue);border:1px solid var(--cs-blue-mid);}
.type-badge.workday{background:var(--cs-green-light);color:var(--cs-green);border:1px solid var(--cs-green-mid);}
.type-badge.multi{background:var(--cs-blue-light);color:var(--cs-blue);border:1px solid var(--cs-blue-mid);}
.close-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:#F8FAFC;cursor:pointer;font-size:15px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mode-tabs{display:flex;gap:6px;margin-bottom:18px;}
.mode-tab{flex:1;padding:9px 8px;border-radius:10px;border:1.5px solid var(--border);background:#F8FAFC;color:var(--text-secondary);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;}
.mode-tab.active.write{border-color:var(--cs-blue);background:var(--cs-blue-light);color:var(--cs-blue);}
.mode-tab.active.remove{border-color:var(--cs-red);background:var(--cs-red-light);color:var(--cs-red);}
.field{margin-bottom:15px;}
.field-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;display:block;margin-bottom:7px;}
.field-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.inp{flex:1;padding:10px 12px;font-size:14px;border-radius:9px;border:1.5px solid var(--border);background:#F8FAFC;color:var(--text-primary);outline:none;font-family:inherit;min-width:0;}
.inp:focus{border-color:var(--cs-blue);background:#fff;}
.inp::placeholder{color:#CBD5E1;}
.btn-me{padding:0 12px;height:40px;border-radius:9px;border:1.5px solid var(--cs-blue-mid);background:var(--cs-blue-light);color:var(--cs-blue);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;}
.btn-me:hover{background:var(--cs-blue);color:#fff;}
.btn-trash{width:40px;height:40px;border-radius:9px;border:1.5px solid #F5B8BF;background:var(--cs-red-light);color:var(--cs-red);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px 4px 7px;border-radius:20px;background:var(--cs-blue-light);color:var(--cs-blue);border:1px solid var(--cs-blue-mid);font-weight:600;}
.tag-x{border:none;background:none;cursor:pointer;color:var(--cs-blue-mid);font-size:14px;padding:0;line-height:1;display:flex;}
.textarea{width:100%;padding:10px 12px;font-size:14px;border-radius:9px;border:1.5px solid var(--border);background:#F8FAFC;color:var(--text-primary);outline:none;resize:vertical;min-height:56px;font-family:inherit;}
.textarea:focus{border-color:var(--cs-blue);background:#fff;}
.textarea::placeholder{color:#CBD5E1;}
.dropdown-wrap{position:relative;flex:1;}
.dropdown-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid var(--cs-blue-mid);border-radius:10px;box-shadow:0 8px 24px rgba(0,101,189,0.15);z-index:200;overflow:hidden;}
.dropdown-item{display:flex;align-items:center;gap:8px;padding:9px 12px;font-size:13px;font-weight:500;color:var(--text-primary);cursor:pointer;}
.dropdown-item:hover,.dropdown-item.active{background:var(--cs-blue-light);color:var(--cs-blue);font-weight:700;}
.overwrite-warn{background:#FFF7ED;border:1px solid #FED7AA;border-radius:9px;padding:10px 12px;font-size:12px;color:#92400E;margin-bottom:14px;}
.remove-actions{display:flex;gap:6px;margin-bottom:14px;}
.remove-sel-btn{padding:4px 10px;border-radius:7px;border:1px solid var(--border);background:#F8FAFC;color:var(--text-secondary);cursor:pointer;font-family:inherit;font-size:12px;}
.remove-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;max-height:280px;overflow-y:auto;}
.remove-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;border:1.5px solid var(--border);background:#F8FAFC;}
.remove-row.has-data{border-color:var(--cs-blue-mid);background:var(--cs-blue-light);}
.remove-row-date{font-size:13px;font-weight:600;color:var(--text-secondary);min-width:60px;}
.remove-row-content{flex:1;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.remove-row-empty{font-size:12px;color:var(--text-muted);font-style:italic;}
.remove-row-svc{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;}
.remove-check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.remove-check.checked{background:var(--cs-red);border-color:var(--cs-red);color:#fff;}
.modal-footer{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:6px;}
.btn-danger{padding:10px 16px;font-size:13px;border-radius:9px;border:none;background:var(--cs-red);color:#fff;cursor:pointer;font-weight:700;font-family:inherit;}
.btn-danger:disabled{opacity:0.4;cursor:default;}
.btn-cancel{padding:10px 14px;font-size:13px;border-radius:9px;border:1.5px solid var(--border);background:#F8FAFC;color:var(--text-secondary);cursor:pointer;font-weight:500;font-family:inherit;}
.btn-save{padding:10px 22px;font-size:13px;border-radius:9px;border:none;background:var(--cs-blue);color:#fff;cursor:pointer;font-weight:700;font-family:inherit;}
.half-panel{border:1.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;}
.half-panel-title{font-size:12px;font-weight:700;color:var(--text-secondary);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.abs-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.abs-type-btn{padding:8px 6px;border-radius:9px;border:1.5px solid var(--border);background:#F8FAFC;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;text-align:center;transition:all 0.15s;}
.abs-type-btn.none-btn{grid-column:1/-1;color:var(--text-muted);}
.abs-type-btn.none-btn.active{border-color:var(--border);background:#F0F4F9;color:var(--text-secondary);}
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1.5rem;background:var(--bg-page);}
.login-card{background:var(--bg-white);border-radius:16px;border:1px solid var(--border);padding:36px 32px;width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;}
.login-icon{width:56px;height:56px;border-radius:14px;background:var(--cs-blue);display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
.login-title{font-size:21px;font-weight:700;color:var(--text-primary);margin-bottom:5px;text-align:center;}
.login-sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;text-align:center;}
.login-inp{width:100%;padding:11px 14px;font-size:14px;border-radius:9px;border:1.5px solid var(--border);background:#F8FAFC;color:var(--text-primary);outline:none;text-align:center;font-family:inherit;margin-bottom:10px;}
.login-inp:focus{border-color:var(--cs-blue);background:#fff;}
.login-inp::placeholder{color:#CBD5E1;}
.login-err{font-size:12px;color:var(--cs-red);min-height:18px;margin-bottom:6px;text-align:center;}
.login-btn{width:100%;padding:12px;font-size:15px;border-radius:9px;border:none;background:var(--cs-blue);color:#fff;cursor:pointer;font-weight:700;font-family:inherit;}
.divider{width:100%;height:1px;background:var(--border);margin:4px 0 16px;}
.toast-container{position:fixed;bottom:24px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:10px;max-width:340px;}
@media(max-width:600px){.toast-container{left:12px;right:12px;bottom:16px;}}
.toast{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:14px;background:#fff;box-shadow:0 8px 32px rgba(0,0,0,0.18),0 2px 8px rgba(0,101,189,0.12);border:1px solid var(--border);animation:toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1);cursor:pointer;position:relative;overflow:hidden;}
.toast:hover{box-shadow:0 10px 36px rgba(0,0,0,0.22);}
.toast.leaving{animation:toastOut 0.3s ease forwards;}
@keyframes toastIn{from{opacity:0;transform:translateY(20px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes toastOut{from{opacity:1;transform:translateY(0) scale(1);}to{opacity:0;transform:translateY(12px) scale(0.95);}}
.toast-icon{font-size:22px;flex-shrink:0;margin-top:1px;}
.toast-body{flex:1;min-width:0;}
.toast-title{font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:3px;}
.toast-msg{font-size:12px;color:var(--text-secondary);line-height:1.5;}
.toast-close{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;padding:0;flex-shrink:0;line-height:1;}
.toast-close:hover{color:var(--text-primary);}
.toast-progress{position:absolute;bottom:0;left:0;height:3px;border-radius:0 0 14px 14px;background:var(--cs-blue);animation:toastProgress 6s linear forwards;}
@keyframes toastProgress{from{width:100%;}to{width:0;}}
.changes-modal-overlay{position:fixed;inset:0;background:rgba(10,20,50,0.5);display:flex;align-items:center;justify-content:center;z-index:1100;backdrop-filter:blur(4px);padding:16px;}
.changes-modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:520px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.changes-modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.changes-modal-title{font-size:18px;font-weight:700;color:var(--text-primary);}
.changes-modal-subtitle{font-size:12px;color:var(--text-muted);margin-top:3px;}
.changes-modal-body{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:10px;}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SUPABASE_URL="https://dddykrcegivdzqqritec.supabase.co";
const SUPABASE_KEY="sb_publishable_etculBl0KKWoDZRNf7LHUw_ITOrlLLn";
const API=`${SUPABASE_URL}/rest/v1/schedule`;
const HDR={"Content-Type":"application/json","apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Prefer":"resolution=merge-duplicates"};
async function dbGet(){const r=await fetch(`${API}?select=key,value`,{headers:HDR});const rows=await r.json();const out={};for(const row of rows){try{out[row.key]=JSON.parse(row.value);}catch{out[row.key]=row.value;}}return out;}
async function dbSet(key,value){await fetch(API,{method:"POST",headers:HDR,body:JSON.stringify({key,value:JSON.stringify(value)})});}
async function dbDel(key){await fetch(`${API}?key=eq.${encodeURIComponent(key)}`,{method:"DELETE",headers:HDR});}

function easterSunday(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;const m=Math.floor((a+11*h+22*l)/451),month=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;return new Date(y,month-1,day);}
function getCzHolidays(y){const easter=easterSunday(y);const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;const add=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};const p=(m,d,name)=>[`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`,name];return Object.fromEntries([p(1,1,"Nový rok"),p(5,1,"Svátek práce"),p(5,8,"Den vítězství"),p(7,5,"Svátek věrozvěstů"),p(7,6,"Den Jana Husa"),p(10,28,"Den Československa"),p(11,17,"Den svobody"),p(12,24,"Štědrý den"),p(12,25,"1. vánoční svátek"),p(12,26,"2. vánoční svátek"),[fmt(add(easter,-2)),"Velký pátek"],[fmt(add(easter,1)),"Velikonoční pondělí"]]);}
const HCZ={};
const getH=y=>{if(!HCZ[y])HCZ[y]=getCzHolidays(y);return HCZ[y];};
const toKey=(y,m,d)=>`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
const keyFromDate=d=>toKey(d.getFullYear(),d.getMonth(),d.getDate());
const getDayType=(y,m,d)=>{const k=toKey(y,m,d);if(getH(y)[k])return"holiday";const w=new Date(y,m,d).getDay();return(w===0||w===6)?"weekend":"workday";};

const MONTHS=["Leden","Únor","Březen","Duben","Květen","Červen","Červenec","Srpen","Září","Říjen","Listopad","Prosinec"];
const MONTHS_SHORT=["Led","Úno","Bře","Dub","Kvě","Čer","Črc","Srp","Zář","Říj","Lis","Pro"];
const DAYS=["Po","Út","St","Čt","Pá","So","Ne"];
const DOW_LABELS=["Ne","Po","Út","St","Čt","Pá","So"];
const TEAM=["Alča","Beáta","Kája","Maroš","Michal","Pavel","Roman","Standa","Terka","Tomáš","Vojta B.","Vojta K."];
const AVATAR_COLORS=["#0065BD","#0052A3","#1A7FC4","#005A8E","#003F7A","#2E8BC0","#0077CC","#004F9F","#1565C0","#0D47A1","#1976D2","#42A5F5"];
const colorFor=n=>AVATAR_COLORS[Math.abs([...n].reduce((a,c)=>a+c.charCodeAt(0),0))%AVATAR_COLORS.length];
const ABSENCE_TYPES=[
  {id:"ho",label:"Home Office",short:"HO",icon:"🏠",color:"#0065BD",bg:"#E8F1FA"},
  {id:"sick",label:"Sick",short:"Sick",icon:"🤒",color:"#D97706",bg:"#FEF3C7"},
  {id:"vacation",label:"Dovolená",short:"DOV",icon:"🏖",color:"#16A34A",bg:"#F0FDF4"},
  {id:"absent",label:"Nepřítomen",short:"ABS",icon:"⛔",color:"#E2001A",bg:"#FDEAEA"},
  {id:"compoff",label:"Volno za službu",short:"VZS",icon:"🎁",color:"#7C3AED",bg:"#F5F3FF"},
];
const absType=id=>ABSENCE_TYPES.find(t=>t.id===id);
const ABS_DAYS=180;
const ABS_OFFSET=-7;

function getDateRange(offsetStart,count){const today=new Date();const keys=[];for(let i=offsetStart;i<offsetStart+count;i++){const d=new Date(today);d.setDate(d.getDate()+i);keys.push(keyFromDate(d));}return keys;}

const Avatar=({name,size=28})=>(
  <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:size,height:size,borderRadius:"50%",background:colorFor(name),color:"#fff",fontSize:size*0.36,fontWeight:700,flexShrink:0}}>
    {name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}
  </span>
);

function App(){
  const today=new Date();
  const todayKey=keyFromDate(today);
  const absDateKeys=getDateRange(ABS_OFFSET,ABS_DAYS);
  const yesterdayDate=new Date(today);yesterdayDate.setDate(yesterdayDate.getDate()-1);
  const yesterdayKey=keyFromDate(yesterdayDate);

  const [curYear,setCurYear]=useState(today.getFullYear());
  const [curMonth,setCurMonth]=useState(today.getMonth());
  const [svcData,setSvcData]=useState({});
  const [absData,setAbsData]=useState({});
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [appMode,setAppMode]=useState("sluzba");
  const [modal,setModal]=useState(null);
  const [modalMode,setModalMode]=useState("write");
  const [svcInput,setSvcInput]=useState("");
  const [noteInput,setNoteInput]=useState("");
  const [backupInput,setBackupInput]=useState("");
  const [localBackup,setLocalBackup]=useState([]);
  const [selectedKeys,setSelectedKeys]=useState(new Set());
  const [selecting,setSelecting]=useState(false);
  const [removeChecked,setRemoveChecked]=useState(new Set());
  const [showSvcDrop,setShowSvcDrop]=useState(false);
  const [showBackupDrop,setShowBackupDrop]=useState(false);
  const [absModal,setAbsModal]=useState(null);
  const [amType,setAmType]=useState(null);
  const [amNote,setAmNote]=useState("");
  const [pmType,setPmType]=useState(null);
  const [pmNote,setPmNote]=useState("");
  const [absSelecting,setAbsSelecting]=useState(false);
  const [absSelCells,setAbsSelCells]=useState([]);
  const [userName,setUserName]=useState("");
  const [loginScreen,setLoginScreen]=useState(true);
  const [loginInput,setLoginInput]=useState("");
  const [passInput,setPassInput]=useState("");
  const [passError,setPassError]=useState(false);
  const [isMobile,setIsMobile]=useState(window.innerWidth<640);
  const headerRef=useRef(null);
  const [headerH,setHeaderH]=useState(0);
  const [toasts,setToasts]=useState([]);
  const prevSvcRef=useRef(null);
  const prevAbsRef=useRef(null);
  const toastIdRef=useRef(0);
  const [changesModal,setChangesModal]=useState(null);
  const notifAskedRef=useRef(false);

  useEffect(()=>{const fn=()=>setIsMobile(window.innerWidth<640);window.addEventListener("resize",fn);return()=>window.removeEventListener("resize",fn);},[]);
  useEffect(()=>{if(headerRef.current)setHeaderH(headerRef.current.offsetHeight);},[isMobile,loginScreen,appMode]);
  useEffect(()=>{if(isMobile&&!loginScreen&&appMode==="sluzba"){setTimeout(()=>{const el=document.getElementById("today-row");if(el)el.scrollIntoView({behavior:"smooth",block:"center"});},300);};},[isMobile,loginScreen,appMode]);
  useEffect(()=>{
    if(!loginScreen&&appMode==="nepritomnost"){
      setTimeout(()=>{
        if(isMobile){
          const el=document.getElementById("abs-today-row");
          if(el)el.scrollIntoView({behavior:"smooth",block:"start"});
        }else{
          const el=document.getElementById("abs-minus2-row")||document.getElementById("abs-today-row");
          if(el)el.scrollIntoView({behavior:"smooth",block:"start"});
        }
      },150);
    }
  },[appMode,loginScreen,isMobile]);
  useEffect(()=>{
    const interval=setInterval(()=>{if(!loginScreen)loadData(true);},30000);
    return()=>clearInterval(interval);
  },[loginScreen]);

  useEffect(()=>{
    const n=localStorage.getItem("vrba_name");const p=localStorage.getItem("vrba_pass");
    if(n)setLoginInput(n);if(p)setPassInput(p);
    // pouze přednačteme data pro UI (bez porovnání – to se děje v doLogin)
    loadData();
  },[]);

  function requestNotifPermission(){
    if(!("Notification" in window)||notifAskedRef.current)return;
    notifAskedRef.current=true;
    if(Notification.permission==="default")Notification.requestPermission();
  }

  function sendWebNotif(title,body){
    if(!("Notification" in window)||Notification.permission!=="granted")return;
    if(document.visibilityState==="visible")return; // jen když je záložka na pozadí
    try{new Notification(title,{body,icon:"https://satanda-cz.github.io/tymova-vrba/favicon.ico"});}catch(e){}
  }

  function buildChangeSummary(oldSvc,newSvc,oldAbs,newAbs){
    const svcChanges=[];
    for(const k of new Set([...Object.keys(oldSvc||{}),...Object.keys(newSvc||{})])){
      const ov=oldSvc?.[k]||null; const nv=newSvc?.[k]||null;
      if(JSON.stringify(ov)===JSON.stringify(nv))continue;
      const[,m,d]=k.split("-");
      const label=`${parseInt(d)}.${parseInt(m)}.`;
      const parts=[];
      if((ov?.service||"")!==(nv?.service||"")){
        if(nv?.service&&!ov?.service)parts.push(`služba → ${nv.service}`);
        else if(!nv?.service&&ov?.service)parts.push(`služba odebrána (byl ${ov.service})`);
        else parts.push(`služba: ${ov.service} → ${nv.service}`);
      }
      const ob=new Set(ov?.backup||[]); const nb=new Set(nv?.backup||[]);
      const added=[...nb].filter(x=>!ob.has(x)); const removed=[...ob].filter(x=>!nb.has(x));
      if(added.length)parts.push(`záloha +${added.join(", ")}`);
      if(removed.length)parts.push(`záloha −${removed.join(", ")}`);
      if((ov?.note||"")!==(nv?.note||"")){
        if(nv?.note)parts.push(`pozn.: "${nv.note}"`);
        else parts.push(`pozn. odstraněna`);
      }
      if(parts.length)svcChanges.push({key:k,label,detail:parts.join(" · ")});
    }
    const absChanges=[];
    const absTypeLabel=id=>{const t=ABSENCE_TYPES.find(x=>x.id===id);return t?`${t.icon} ${t.label}`:id;};
    for(const k of new Set([...Object.keys(oldAbs||{}),...Object.keys(newAbs||{})])){
      const ov=oldAbs?.[k]||{}; const nv=newAbs?.[k]||{};
      if(JSON.stringify(ov)===JSON.stringify(nv))continue;
      const[,m,d]=k.split("-");
      const label=`${parseInt(d)}.${parseInt(m)}.`;
      const members=new Set([...Object.keys(ov),...Object.keys(nv)]);
      const parts=[];
      for(const member of members){
        const om=ov[member]||{}; const nm=nv[member]||{};
        for(const half of["am","pm"]){
          const ot=om[half]?.type||null; const nt=nm[half]?.type||null;
          if(ot===nt)continue;
          const halfLabel=half==="am"?"dop.":"odp.";
          if(nt&&!ot)parts.push(`${member} ${halfLabel} → ${absTypeLabel(nt)}`);
          else if(!nt&&ot)parts.push(`${member} ${halfLabel} zrušeno (byl ${absTypeLabel(ot)})`);
          else parts.push(`${member} ${halfLabel}: ${absTypeLabel(ot)} → ${absTypeLabel(nt)}`);
        }
      }
      if(parts.length)absChanges.push({key:k,label,detail:parts.join(", ")});
    }
    return{svcChanges,absChanges};
  }

  async function loadData(isRefresh=false,snapshotSvc=null,snapshotAbs=null){
    if(!isRefresh)setLoading(true);
    try{
      const d=await dbGet();
      const newSvc={};const newAbs={};
      for(const[k,v] of Object.entries(d)){
        if(k.startsWith("abs2_"))newAbs[k.slice(5)]=v;
        else newSvc[k]=v;
      }
      const compareSvc=snapshotSvc||prevSvcRef.current;
      const compareAbs=snapshotAbs||prevAbsRef.current;
      if(compareSvc!==null&&compareAbs!==null){
        const{svcChanges,absChanges}=buildChangeSummary(compareSvc,newSvc,compareAbs,newAbs);
        const total=svcChanges.length+absChanges.length;
        if(total>0){
          const fmt=k=>{const[,m,d]=k.split("-");return`${parseInt(d)}.${parseInt(m)}.`;};
          const shortParts=[];
          if(svcChanges.length)shortParts.push(`Služba: ${svcChanges.slice(0,2).map(c=>c.label).join(", ")}${svcChanges.length>2?` +${svcChanges.length-2}`:""}`);
          if(absChanges.length)shortParts.push(`Nepřítomnost: ${absChanges.slice(0,2).map(c=>c.label).join(", ")}${absChanges.length>2?` +${absChanges.length-2}`:""}`);
          const toastMsg=shortParts.join(" · ");
          if(snapshotSvc){
            // přihlášení – zobraz modal se souhrnem
            setChangesModal({svcChanges,absChanges,fromLogin:true});
          }else{
            addToast("🔔",`${total} ${total===1?"změna":"změny"} od kolegy`,toastMsg,{svcChanges,absChanges});
            sendWebNotif(`Týmová vrba – ${total} ${total===1?"změna":"změny"}`,toastMsg);
          }
        }
      }
      prevSvcRef.current=newSvc;
      prevAbsRef.current=newAbs;
      setSvcData(newSvc);setAbsData(newAbs);
      saveSnapshot(newSvc,newAbs);
    }catch(e){console.error(e);}finally{if(!isRefresh)setLoading(false);}
  }

  function addToast(icon,title,msg,changes=null){
    const id=++toastIdRef.current;
    setToasts(prev=>[...prev,{id,icon,title,msg,changes,leaving:false}]);
    setTimeout(()=>dismissToast(id),8000);
  }
  function dismissToast(id){
    setToasts(prev=>prev.map(t=>t.id===id?{...t,leaving:true}:t));
    setTimeout(()=>setToasts(prev=>prev.filter(t=>t.id!==id)),320);
  }

  async function persistSvcKey(key,val){setSaving(true);try{if(val===null)await dbDel(key);else await dbSet(key,val);}catch(e){}setSaving(false);}
  async function persistAbsKey(dateKey,val){setSaving(true);try{if(val===null)await dbDel("abs2_"+dateKey);else await dbSet("abs2_"+dateKey,val);}catch(e){}setSaving(false);}

  const prevMonth=()=>{if(curMonth===0){setCurYear(y=>y-1);setCurMonth(11);}else setCurMonth(m=>m-1);};
  const nextMonth=()=>{if(curMonth===11){setCurYear(y=>y+1);setCurMonth(0);}else setCurMonth(m=>m+1);};

  async function doLogin(){
    const n=loginInput.trim();if(!n)return;
    if(passInput.trim().toUpperCase()!=="DAR"){setPassError(true);return;}
    localStorage.setItem("vrba_name",n);localStorage.setItem("vrba_pass",passInput.trim());
    setUserName(n);setLoginScreen(false);
    requestNotifPermission();
    // načti snapshot z minulého použití
    let snapSvc=null;let snapAbs=null;
    try{
      const ss=localStorage.getItem("vrba_snap_svc");
      const sa=localStorage.getItem("vrba_snap_abs");
      if(ss)snapSvc=JSON.parse(ss);
      if(sa)snapAbs=JSON.parse(sa);
    }catch(e){}
    // pokud existuje snapshot, porovnej při načtení
    if(snapSvc!==null&&snapAbs!==null){
      loadData(false,snapSvc,snapAbs);
    }else{
      loadData();
    }
  }

  function saveSnapshot(svc,abs){
    try{
      localStorage.setItem("vrba_snap_svc",JSON.stringify(svc));
      localStorage.setItem("vrba_snap_abs",JSON.stringify(abs));
    }catch(e){}
  }

  function handleCellClick(key){if(selecting){setSelectedKeys(prev=>{const nx=new Set(prev);nx.has(key)?nx.delete(key):nx.add(key);return nx;});}else{openDays([key]);}}
  function openDays(keys){
    const isM=keys.length>1;
    if(!isM){const rec=svcData[keys[0]]||{};setSvcInput(rec.service||"");setNoteInput(rec.note||"");setLocalBackup(rec.backup||[]);}
    else{setSvcInput("");setNoteInput("");setLocalBackup([]);}
    setBackupInput("");setRemoveChecked(new Set(keys.filter(k=>svcData[k]?.service||svcData[k]?.backup?.length>0)));setModalMode("write");setModal({keys});
  }
  async function handleSave(){
    let backup=[...localBackup];
    if(backupInput.trim()){const ex=backupInput.split(",").map(s=>s.trim()).filter(Boolean);backup=[...new Set([...backup,...ex])];}
    const nd={...svcData};
    for(const key of modal.keys){
      const rec={service:svcInput.trim(),backup,note:noteInput.trim()};
      if(!rec.service&&!backup.length&&!rec.note){delete nd[key];await persistSvcKey(key,null);}
      else{nd[key]=rec;await persistSvcKey(key,rec);}
    }
    setSvcData(nd);setSaving(false);closeModal();
  }
  async function handleRemoveSelected(){
    const nd={...svcData};
    for(const key of removeChecked){delete nd[key];await persistSvcKey(key,null);}
    setSvcData(nd);closeModal();
  }
  function closeModal(){setModal(null);setSelectedKeys(new Set());setSelecting(false);setShowSvcDrop(false);setShowBackupDrop(false);}
  function cancelSelection(){setSelectedKeys(new Set());setSelecting(false);}

  function isCellSelected(dateKey,member,half){return absSelCells.some(c=>c.dateKey===dateKey&&c.member===member&&c.half===half);}
  function toggleAbsCell(dateKey,member,half,e){
    if(e)e.stopPropagation();
    setAbsSelCells(prev=>{const idx=prev.findIndex(c=>c.dateKey===dateKey&&c.member===member&&c.half===half);if(idx>=0)return prev.filter((_,i)=>i!==idx);return [...prev,{dateKey,member,half}];});
  }
  function openAbsModal(dateKey,member,half,e){
    if(absSelecting){toggleAbsCell(dateKey,member,half,e);return;}
    if(e)e.stopPropagation();
    const rec=absData[dateKey]?.[member]||{};
    setAmType(rec.am?.type||null);setAmNote(rec.am?.note||"");
    setPmType(rec.pm?.type||null);setPmNote(rec.pm?.note||"");
    setAbsModal({dateKey,member,multi:false});
  }
  function openAbsMultiModal(){
    if(absSelCells.length===0)return;
    setAmType(null);setAmNote("");
    setAbsModal({multi:true,cells:absSelCells});
  }
  async function saveAbsence(){
    const nd={...absData};
    if(absModal.multi){
      const affectedDays=new Set(absModal.cells.map(c=>c.dateKey));
      for(const cell of absModal.cells){
        const{dateKey,member,half}=cell;
        if(!nd[dateKey])nd[dateKey]={};
        const day={...nd[dateKey]};
        const existing=day[member]||{};
        const updated={...existing};
        if(amType)updated[half]={type:amType,note:amNote.trim()};else delete updated[half];
        if(!updated.am&&!updated.pm)delete day[member];else day[member]=updated;
        if(Object.keys(day).length===0)delete nd[dateKey];else nd[dateKey]=day;
      }
      for(const dateKey of affectedDays){await persistAbsKey(dateKey,nd[dateKey]||null);}
    }else{
      const{dateKey,member}=absModal;
      if(!nd[dateKey])nd[dateKey]={};
      const day={...nd[dateKey]};
      const entry={};
      if(amType)entry.am={type:amType,note:amNote.trim()};
      if(pmType)entry.pm={type:pmType,note:pmNote.trim()};
      if(Object.keys(entry).length===0)delete day[member];else day[member]=entry;
      if(Object.keys(day).length===0)delete nd[dateKey];else nd[dateKey]=day;
      await persistAbsKey(dateKey,nd[dateKey]||null);
    }
    setAbsData(nd);setAbsModal(null);setAbsSelCells([]);setAbsSelecting(false);
  }

  const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
  let firstDow=new Date(curYear,curMonth,1).getDay();firstDow=firstDow===0?6:firstDow-1;
  const cells=[...Array(firstDow).fill(null),...Array.from({length:daysInMonth},(_,i)=>i+1)];
  while(cells.length%7!==0)cells.push(null);
  const isMulti=modal?.keys?.length>1;
  const overwrittenDays=modal?.keys?.filter(k=>svcData[k]?.service||svcData[k]?.backup?.length>0)??[];
  const teamWithMe=[...TEAM,...(userName&&!TEAM.includes(userName)?[userName]:[])];

  const renderBadge=(type)=>{if(!type)return null;const at=absType(type);if(!at)return null;return <span className="abs-badge" style={{background:at.bg,color:at.color}}>{at.icon} {at.short}</span>;};

  const renderDesktopCell=(d,i)=>{
    if(!d)return <div key={i} style={{minHeight:80}}></div>;
    const key=toKey(curYear,curMonth,d);const type=getDayType(curYear,curMonth,d);const rec=svcData[key];
    const isToday=key===todayKey;const isSel=selectedKeys.has(key);
    const isPast=new Date(curYear,curMonth,d)<new Date(today.getFullYear(),today.getMonth(),today.getDate());
    const uncovered=!isSel&&type!=="holiday"&&!rec?.service;const hasService=!!rec?.service;
    const numCls=`cell-num${isToday?" tn":type==="holiday"?" hn":type==="weekend"?" wn":""}`;
    return(
      <div key={key} className={`cell ${type}${isToday?" today":""}${isSel?" selected":""}${uncovered?" uncovered":""}${isPast?" past":""}`} onClick={()=>handleCellClick(key)}>
        <div className="cell-top">
          <span className={numCls}>{d}</span>
          {type!=="holiday"&&!isSel&&(hasService?<span style={{width:8,height:8,borderRadius:"50%",background:"#16A34A",display:"inline-block",flexShrink:0}}></span>:<span style={{fontSize:10,lineHeight:1}}>⚠️</span>)}

                <div className="field-row">
                  <div className="dropdown-wrap">
                    <input className="inp" placeholder="Jméno..." value={backupInput} onChange={e=>setBackupInput(e.target.value)} onFocus={()=>setShowBackupDrop(true)} onBlur={()=>setTimeout(()=>setShowBackupDrop(false),150)} onKeyDown={e=>{if(e.key==="Enter"&&backupInput.trim()){const ns=backupInput.split(",").map(s=>s.trim()).filter(Boolean);setLocalBackup(lb=>[...new Set([...lb,...ns])]);setBackupInput("");}}}/>
                    {showBackupDrop&&(<div className="dropdown-list">{teamWithMe.filter(n=>!localBackup.includes(n)&&n.toLowerCase().includes(backupInput.toLowerCase())).map(n=>(<div key={n} className="dropdown-item" onMouseDown={()=>{setLocalBackup(lb=>[...new Set([...lb,n])]);setBackupInput("");setShowBackupDrop(false);}}><Avatar name={n} size={20}/>{n}</div>))}</div>)}
                  </div>
                  <button className="btn-me" onClick={()=>{if(!localBackup.includes(userName))setLocalBackup(lb=>[...lb,userName]);}}>+ Já</button>
                  {isMulti&&<button className="btn-trash" onClick={async()=>{const nd={...svcData};for(const key of modal.keys){if(nd[key]?.backup){nd[key]={...nd[key],backup:nd[key].backup.filter(n=>n!==userName)};await persistSvcKey(key,nd[key]);}}setSvcData(nd);}}>🗑</button>}
                  {!isMulti&&localBackup.length>0&&<button className="btn-trash" onClick={()=>setLocalBackup([])}>🗑</button>}
                </div>
                {isMulti&&<div style={{fontSize:11,color:"var(--text-muted)",marginTop:5}}>🗑 odebere jen vás okamžitě · „Uložit" přidá do všech dní</div>}
              </div>
              <div className="field"><label className="field-label">Poznámka</label>
                <textarea className="textarea" placeholder="Volitelná poznámka..." value={noteInput} onChange={e=>setNoteInput(e.target.value)} rows={2}/>
              </div>
              <div className="modal-footer"><div/><div style={{display:"flex",gap:8}}>
                <button className="btn-cancel" onClick={()=>setModal(null)}>Zrušit</button>
                <button className="btn-save" onClick={handleSave}>{isMulti?`Uložit ${modal.keys.length} dní`:"Uložit"}</button>
              </div></div>
            </>)}
            {modalMode==="remove"&&(<>
              <div className="remove-actions">
                <button className="remove-sel-btn" onClick={()=>setRemoveChecked(new Set(sortedKeys.filter(k=>svcData[k]?.service||svcData[k]?.backup?.length>0)))}>Vybrat vše s daty</button>
                <button className="remove-sel-btn" onClick={()=>setRemoveChecked(new Set())}>Odznačit vše</button>
              </div>
              <div className="remove-list">
                {sortedKeys.map(k=>{const[,km,kd]=k.split("-");const rec=svcData[k];const hasData=!!(rec?.service||rec?.backup?.length>0);const checked=removeChecked.has(k);
                  return(<div key={k} className={`remove-row${hasData?" has-data":""}`}>
                    <div className="remove-row-date">{parseInt(kd)}.{parseInt(km)}.</div>
                    <div className="remove-row-content">{hasData?(<>{rec.service&&<div className="remove-row-svc"><Avatar name={rec.service} size={16}/>{rec.service}</div>}{rec.backup?.length>0&&<div style={{display:"flex",gap:3,flexWrap:"wrap"}}>{rec.backup.map(n=><span key={n} style={{fontSize:11,color:"var(--cs-blue)",fontWeight:600}}>{n}</span>)}</div>}</>):(<span className="remove-row-empty">prázdný den</span>)}</div>
                    <button className={`remove-check${checked?" checked":""}`} onClick={()=>setRemoveChecked(prev=>{const nx=new Set(prev);nx.has(k)?nx.delete(k):nx.add(k);return nx;})} disabled={!hasData}>{checked?"✓":""}</button>
                  </div>);
                })}
              </div>
              <div className="modal-footer">
                <div style={{fontSize:12,color:"var(--text-muted)"}}>Označeno: {removeChecked.size} dní</div>
                <div style={{display:"flex",gap:8}}>
                  <button className="btn-cancel" onClick={()=>setModal(null)}>Zrušit</button>
                  <button className="btn-danger" disabled={removeChecked.size===0} onClick={handleRemoveSelected}>🗑 Smazat {removeChecked.size>0?removeChecked.size+" dní":""}</button>
                </div>
              </div>
            </>)}
          </div>
        </div>);
      })()}

      {/* ABSENCE MODAL */}
      {absModal&&(()=>{
        const isAbsMulti=absModal.multi;
        const[,mm,dd]=isAbsMulti?["","",""]:(absModal.dateKey.split("-"));
        return(<div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setAbsModal(null);}}>
          <div className="modal">
            <div className="modal-drag"></div>
            <div className="modal-header">
              <div>
                {isAbsMulti?(
                  <>
                    <div className="modal-date">Hromadná úprava</div>
                    <span className="type-badge multi">📅 {absModal.cells.length} polo{absModal.cells.length===1?"vka":"vek"}</span>
                    <div style={{fontSize:11,color:"var(--text-muted)",marginTop:6,lineHeight:1.8,maxHeight:80,overflowY:"auto"}}>
                      {absModal.cells.map((c,i)=><span key={i} style={{display:"inline-block",marginRight:6}}><strong>{c.member}</strong> {parseInt(c.dateKey.split("-")[2])}.{parseInt(c.dateKey.split("-")[1])}.{c.half==="am"?" dop.":" odp."}</span>)}
                    </div>
                  </>
                ):(
                  <><div className="modal-date">{parseInt(dd)}. {MONTHS[parseInt(mm)-1]}</div><div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}><Avatar name={absModal.member} size={28}/><span style={{fontSize:16,fontWeight:700}}>{absModal.member}</span></div></>
                )}
              </div>
              <button className="close-btn" onClick={()=>setAbsModal(null)}>✕</button>
            </div>
            {isAbsMulti?(
              <div className="half-panel" style={{borderColor:amType?absType(amType)?.color:"var(--cs-blue)"}}>
                <div className="half-panel-title">
                  <span style={{background:"var(--cs-blue)",color:"#fff",fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:5}}>TYP NEPŘÍTOMNOSTI</span>
                  {amType&&<span style={{fontSize:12,color:absType(amType)?.color,fontWeight:600}}>{absType(amType)?.icon} {absType(amType)?.label}</span>}
                </div>
                <div className="abs-type-grid">
                  {ABSENCE_TYPES.map(t=>(<button key={t.id} className="abs-type-btn" onClick={()=>setAmType(amType===t.id?null:t.id)} style={{borderColor:amType===t.id?t.color:undefined,background:amType===t.id?t.bg:undefined,color:amType===t.id?t.color:undefined}}>{t.icon} {t.label}</button>))}
                  <button className={`abs-type-btn none-btn${!amType?" active":""}`} onClick={()=>setAmType(null)}>✕ Vymazat</button>
                </div>
                {amType&&<><label className="field-label" style={{marginTop:4}}>Komentář</label><textarea className="textarea" rows={1} placeholder="Volitelný komentář..." value={amNote} onChange={e=>setAmNote(e.target.value)}/></>}
              </div>
            ):(
              <>
                <div className="half-panel" style={{borderColor:amType?absType(amType)?.color:"var(--border)"}}>
                  <div className="half-panel-title">
                    <span style={{background:"var(--cs-blue)",color:"#fff",fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:5}}>DOPOLEDNE</span>
                    {amType&&<span style={{fontSize:12,color:absType(amType)?.color,fontWeight:600}}>{absType(amType)?.icon} {absType(amType)?.label}</span>}
                  </div>
                  <div className="abs-type-grid">
                    {ABSENCE_TYPES.map(t=>(<button key={t.id} className="abs-type-btn" onClick={()=>setAmType(amType===t.id?null:t.id)} style={{borderColor:amType===t.id?t.color:undefined,background:amType===t.id?t.bg:undefined,color:amType===t.id?t.color:undefined}}>{t.icon} {t.label}</button>))}
                    <button className={`abs-type-btn none-btn${!amType?" active":""}`} onClick={()=>setAmType(null)}>✕ Přítomen / vymazat</button>
                  </div>
                  {amType&&<><label className="field-label" style={{marginTop:4}}>Komentář</label><textarea className="textarea" rows={1} placeholder="Volitelný komentář..." value={amNote} onChange={e=>setAmNote(e.target.value)}/></>}
                </div>
                <div className="half-panel" style={{borderColor:pmType?absType(pmType)?.color:"var(--border)"}}>
                  <div className="half-panel-title">
                    <span style={{background:"var(--text-secondary)",color:"#fff",fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:5}}>ODPOLEDNE</span>
                    {pmType&&<span style={{fontSize:12,color:absType(pmType)?.color,fontWeight:600}}>{absType(pmType)?.icon} {absType(pmType)?.label}</span>}
                  </div>
                  <div className="abs-type-grid">
                    {ABSENCE_TYPES.map(t=>(<button key={t.id} className="abs-type-btn" onClick={()=>setPmType(pmType===t.id?null:t.id)} style={{borderColor:pmType===t.id?t.color:undefined,background:pmType===t.id?t.bg:undefined,color:pmType===t.id?t.color:undefined}}>{t.icon} {t.label}</button>))}
                    <button className={`abs-type-btn none-btn${!pmType?" active":""}`} onClick={()=>setPmType(null)}>✕ Přítomen / vymazat</button>
                  </div>
                  {pmType&&<><label className="field-label" style={{marginTop:4}}>Komentář</label><textarea className="textarea" rows={1} placeholder="Volitelný komentář..." value={pmNote} onChange={e=>setPmNote(e.target.value)}/></>}
                </div>
              </>
            )}
            <div className="modal-footer"><div/>
              <div style={{display:"flex",gap:8}}>
                <button className="btn-cancel" onClick={()=>setAbsModal(null)}>Zrušit</button>
                <button className="btn-save" onClick={saveAbsence}>{isAbsMulti?`Uložit ${absModal.cells.length} polo${absModal.cells.length===1?"vku":"vek"}`:"Uložit"}</button>
              </div>
            </div>
          </div>
        </div>);
      })()}
    </div>
    <div className="toast-container">
      {toasts.map(t=>(
        <div key={t.id} className={`toast${t.leaving?" leaving":""}`} onClick={()=>dismissToast(t.id)}>
          <span className="toast-icon">{t.icon}</span>
          <div className="toast-body">
            <div className="toast-title">{t.title}</div>
            <div className="toast-msg">{t.msg}</div>
            {t.changes&&<button className="toast-detail-btn" onClick={e=>{e.stopPropagation();setChangesModal(t.changes);dismissToast(t.id);}}>📋 Zobrazit detail</button>}
          </div>
          <button className="toast-close" onClick={e=>{e.stopPropagation();dismissToast(t.id);}}>✕</button>
          {!t.leaving&&<div className="toast-progress"></div>}
        </div>
      ))}
    </div>
    {changesModal&&(
      <div className="changes-modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setChangesModal(null);}}>
        <div className="changes-modal">
          <div className="changes-modal-header">
            <div>
              <div className="changes-modal-title">🔔 Změny od kolegy</div>
              <div className="changes-modal-subtitle">{changesModal.fromLogin?"od posledního přihlášení":"od posledního refreshe"}</div>
            </div>
            <button className="close-btn" onClick={()=>setChangesModal(null)}>✕</button>
          </div>
          <div className="changes-modal-body">
            {changesModal.svcChanges?.length>0&&(<div>
              <div className="changes-section-title">📋 Služba</div>
              {changesModal.svcChanges.map(c=>(
                <div key={c.key} className="change-row">
                  <div className="change-row-header"><span className="change-row-date">{c.label}</span></div>
                  <div className="change-row-detail">{c.detail}</div>
                </div>
              ))}
            </div>)}
            {changesModal.absChanges?.length>0&&(<div>
              <div className="changes-section-title">🏠 Nepřítomnost</div>
              {changesModal.absChanges.map(c=>(
                <div key={c.key} className="change-row">
                  <div className="change-row-header"><span className="change-row-date">{c.label}</span></div>
                  <div className="change-row-detail">{c.detail}</div>
                </div>
              ))}
            </div>)}
          </div>
          <div style={{marginTop:16,display:"flex",justifyContent:"flex-end"}}>
            <button className="btn-save" onClick={()=>setChangesModal(null)}>Zavřít</button>
          </div>
        </div>
      </div>
    )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

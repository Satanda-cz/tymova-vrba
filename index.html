<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SUPABASE_URL = "https://dddykrcegivdzqqritec.supabase.co";
const SUPABASE_KEY = "sb_publishable_etculBl0KKWoDZRNf7LHUw_ITOrlLLn";
const API = `${SUPABASE_URL}/rest/v1/schedule`;
const HDR = {"Content-Type":"application/json","apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Prefer":"resolution=merge-duplicates"};

async function dbGet(){
  const r=await fetch(`${API}?select=key,value`,{headers:HDR});
  const rows=await r.json();const out={};
  for(const row of rows){try{out[row.key]=JSON.parse(row.value);}catch{out[row.key]=row.value;}}
  return out;
}
async function dbSet(key,value){await fetch(API,{method:"POST",headers:HDR,body:JSON.stringify({key,value:JSON.stringify(value)})});}
async function dbDel(key){await fetch(`${API}?key=eq.${encodeURIComponent(key)}`,{method:"DELETE",headers:HDR});}

function easterSunday(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451),month=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;
  return new Date(y,month-1,day);
}
function getCzHolidays(y){
  const easter=easterSunday(y);
  const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const add=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
  const p=(m,d,name)=>[`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`,name];
  return Object.fromEntries([p(1,1,"Nový rok"),p(5,1,"Svátek práce"),p(5,8,"Den vítězství"),p(7,5,"Svátek věrozvěstů"),p(7,6,"Den Jana Husa"),p(10,28,"Den Československa"),p(11,17,"Den svobody"),p(12,24,"Štědrý den"),p(12,25,"1. vánoční svátek"),p(12,26,"2. vánoční svátek"),[fmt(add(easter,-2)),"Velký pátek"],[fmt(add(easter,1)),"Velikonoční pondělí"]]);
}
const HCZ={};
const getH=y=>{if(!HCZ[y])HCZ[y]=getCzHolidays(y);return HCZ[y];};
const toKey=(y,m,d)=>`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
const getDayType=(y,m,d)=>{const k=toKey(y,m,d);if(getH(y)[k])return"holiday";const w=new Date(y,m,d).getDay();return(w===0||w===6)?"weekend":"workday";};

const MONTHS=["Leden","Únor","Březen","Duben","Květen","Červen","Červenec","Srpen","Září","Říjen","Listopad","Prosinec"];
const DAYS=["Po","Út","St","Čt","Pá","So","Ne"];
const TEAM=["Kuba","Michal B.","Standa","Kája","Tomáš"];
const DOW_LABELS=["Ne","Po","Út","St","Čt","Pá","So"];
const AVATAR_COLORS=["#0065BD","#0052A3","#1A7FC4","#005A8E","#003F7A","#2E8BC0","#0077CC","#004F9F"];
const colorFor=n=>AVATAR_COLORS[Math.abs([...n].reduce((a,c)=>a+c.charCodeAt(0),0))%AVATAR_COLORS.length];

const Avatar=({name,size=28})=>(
  <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:size,height:size,borderRadius:"50%",background:colorFor(name),color:"#fff",fontSize:size*0.36,fontWeight:700,flexShrink:0}}>
    {name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}
  </span>
);

function App(){
  const today=new Date();
  const [curYear,setCurYear]=useState(today.getFullYear());
  const [curMonth,setCurMonth]=useState(today.getMonth());
  const [data,setData]=useState({});
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [modal,setModal]=useState(null);
  const [modalMode,setModalMode]=useState("write");
  const [userName,setUserName]=useState("");
  const [loginScreen,setLoginScreen]=useState(true);
  const [loginInput,setLoginInput]=useState("");
  const [passInput,setPassInput]=useState("");
  const [passError,setPassError]=useState(false);
  const [svcInput,setSvcInput]=useState("");
  const [noteInput,setNoteInput]=useState("");
  const [backupInput,setBackupInput]=useState("");
  const [localBackup,setLocalBackup]=useState([]);
  const [selectedKeys,setSelectedKeys]=useState(new Set());
  const [selecting,setSelecting]=useState(false);
  const [removeChecked,setRemoveChecked]=useState(new Set());
  const [showSvcDrop,setShowSvcDrop]=useState(false);
  const [showBackupDrop,setShowBackupDrop]=useState(false);
  const [isMobile,setIsMobile]=useState(window.innerWidth<640);
  const headerRef=useRef(null);
  const [headerH,setHeaderH]=useState(0);

  useEffect(()=>{
    const fn=()=>setIsMobile(window.innerWidth<640);
    window.addEventListener("resize",fn);
    return()=>window.removeEventListener("resize",fn);
  },[]);

  useEffect(()=>{
    if(headerRef.current)setHeaderH(headerRef.current.offsetHeight);
  },[isMobile,loginScreen]);

  useEffect(()=>{
    if(isMobile&&!loginScreen){
      setTimeout(()=>{const el=document.getElementById("today-row");if(el)el.scrollIntoView({behavior:"smooth",block:"center"});},300);
    }
  },[isMobile,loginScreen]);

  useEffect(()=>{
    const n=localStorage.getItem("vrba_name");
    const p=localStorage.getItem("vrba_pass");
    if(n)setLoginInput(n);if(p)setPassInput(p);
    loadData();
  },[]);

  async function loadData(){setLoading(true);try{const d=await dbGet();setData(d);}catch(e){}finally{setLoading(false);}}
  async function persist(key,value){setSaving(true);try{await dbSet(key,value);}catch(e){}setSaving(false);}
  async function remove(key){setSaving(true);try{await dbDel(key);}catch(e){}setSaving(false);}

  const prevMonth=()=>{if(curMonth===0){setCurYear(y=>y-1);setCurMonth(11);}else setCurMonth(m=>m-1);};
  const nextMonth=()=>{if(curMonth===11){setCurYear(y=>y+1);setCurMonth(0);}else setCurMonth(m=>m+1);};

  function doLogin(){
    const n=loginInput.trim();if(!n)return;
    if(passInput.trim().toUpperCase()!=="DAR"){setPassError(true);return;}
    localStorage.setItem("vrba_name",n);localStorage.setItem("vrba_pass",passInput.trim());
    setUserName(n);setLoginScreen(false);
  }

  function handleCellClick(key){
    if(selecting){setSelectedKeys(prev=>{const nx=new Set(prev);nx.has(key)?nx.delete(key):nx.add(key);return nx;});}
    else{openDays([key]);}
  }

  function openDays(keys){
    const isM=keys.length>1;
    if(!isM){const rec=data[keys[0]]||{};setSvcInput(rec.service||"");setNoteInput(rec.note||"");setLocalBackup(rec.backup||[]);}
    else{setSvcInput("");setNoteInput("");setLocalBackup([]);}
    setBackupInput("");
    setRemoveChecked(new Set(keys.filter(k=>data[k]?.service||data[k]?.backup?.length>0)));
    setModalMode("write");setModal({keys});
  }

  async function handleSave(){
    let backup=[...localBackup];
    if(backupInput.trim()){const ex=backupInput.split(",").map(s=>s.trim()).filter(Boolean);backup=[...new Set([...backup,...ex])];}
    const nd={...data};
    for(const key of modal.keys){
      const rec={service:svcInput.trim(),backup,note:noteInput.trim()};
      if(!rec.service&&!backup.length&&!rec.note){delete nd[key];await remove(key);}
      else{nd[key]=rec;await persist(key,rec);}
    }
    setData(nd);closeModal();
  }

  async function handleRemoveSelected(){
    const nd={...data};
    for(const key of removeChecked){delete nd[key];await remove(key);}
    setData(nd);closeModal();
  }

  function closeModal(){setModal(null);setSelectedKeys(new Set());setSelecting(false);setShowSvcDrop(false);setShowBackupDrop(false);}
  function cancelSelection(){setSelectedKeys(new Set());setSelecting(false);}

  const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
  let firstDow=new Date(curYear,curMonth,1).getDay();
  firstDow=firstDow===0?6:firstDow-1;
  const cells=[...Array(firstDow).fill(null),...Array.from({length:daysInMonth},(_,i)=>i+1)];
  while(cells.length%7!==0)cells.push(null);
  const todayKey=toKey(today.getFullYear(),today.getMonth(),today.getDate());
  const isMulti=modal?.keys?.length>1;
  const overwrittenDays=modal?.keys?.filter(k=>data[k]?.service||data[k]?.backup?.length>0)??[];
  const teamWithMe=[...TEAM,...(userName&&!TEAM.includes(userName)?[userName]:[])];

  if(loginScreen) return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-icon"><svg width="26" height="26" viewBox="0 0 28 28" fill="none"><polyline points="2,22 8,14 13,18 20,8 26,4" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/><circle cx="26" cy="4" r="2.5" fill="#fff"/></svg></div>
        <div className="login-title">Týmová vrba SR&BI</div>
        <div className="login-sub">Přihlaste se pro přístup ke kalendáři</div>
        <div className="divider"></div>
        <input className="login-inp" placeholder="Vaše jméno..." value={loginInput} onChange={e=>setLoginInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} autoFocus/>
        <input className="login-inp" placeholder="Heslo..." type="password" value={passInput} onChange={e=>{setPassInput(e.target.value);setPassError(false);}} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
        <div className="login-err">{passError?"Nesprávné heslo":""}</div>
        <button className="login-btn" onClick={doLogin}>Vstoupit →</button>
      </div>
    </div>
  );

  const renderModal=()=>{
    if(!modal)return null;
    const sortedKeys=[...modal.keys].sort();
    return (
      <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setModal(null);}}>
        <div className="modal">
          <div className="modal-drag"></div>
          <div className="modal-header">
            <div>
              {isMulti?(
                <><div className="modal-date">Hromadná úprava</div><span className="type-badge multi">📅 {modal.keys.length} dní</span><div className="modal-date-sub">{sortedKeys.map(k=>{const[,mm,dd]=k.split("-");return`${parseInt(dd)}.${parseInt(mm)}.`;}).join("  ·  ")}</div></>
              ):(()=>{
                const [ky,km,kd]=modal.keys[0].split("-").map(Number);
                const type=getDayType(ky,km-1,kd);
                const label=type==="holiday"?getH(ky)[modal.keys[0]]:type==="weekend"?"Víkend":"Všední den";
                return(<><div className="modal-date">{kd}. {MONTHS[km-1]} {ky}</div><span className={`type-badge ${type}`}>{label}</span></>);
              })()}
            </div>
            <button className="close-btn" onClick={()=>setModal(null)}>✕</button>
          </div>
          <div className="mode-tabs">
            <button className={`mode-tab${modalMode==="write"?" active write":""}`} onClick={()=>setModalMode("write")}>✏️ {isMulti?"Zapsat do dní":"Zapsat"}</button>
            <button className={`mode-tab${modalMode==="remove"?" active remove":""}`} onClick={()=>setModalMode("remove")}>🗑 {isMulti?"Smazat záznamy":"Smazat záznam"}</button>
          </div>
          {modalMode==="write"&&(
            <>
              {isMulti&&overwrittenDays.length>0&&<div className="overwrite-warn">⚠️ {overwrittenDays.length} z vybraných dní již má záznam – bude přepsán.</div>}
              <div className="field">
                <label className="field-label">Služba</label>
                <div className="field-row">
                  {svcInput&&<Avatar name={svcInput} size={32}/>}
                  <div className="dropdown-wrap">
                    <input className="inp" placeholder="Jméno..." value={svcInput} onChange={e=>setSvcInput(e.target.value)} onFocus={()=>setShowSvcDrop(true)} onBlur={()=>setTimeout(()=>setShowSvcDrop(false),150)}/>
                    {showSvcDrop&&(<div className="dropdown-list">{teamWithMe.filter(n=>n.toLowerCase().includes(svcInput.toLowerCase())).map(n=>(<div key={n} className={`dropdown-item${svcInput===n?" active":""}`} onMouseDown={()=>{setSvcInput(n);setShowSvcDrop(false);}}><Avatar name={n} size={20}/>{n}</div>))}</div>)}
                  </div>
                  <button className="btn-me" onClick={()=>setSvcInput(userName)}>+ Já</button>
                  {isMulti&&<button className="btn-trash" onClick={async()=>{const nd={...data};for(const key of modal.keys){if(nd[key]?.service===userName){const r={...nd[key]};delete r.service;nd[key]=r;await persist(key,r);}}setData(nd);}}>🗑</button>}
                  {!isMulti&&svcInput&&<button className="btn-trash" onClick={()=>setSvcInput("")}>🗑</button>}
                </div>
                {isMulti&&<div style={{fontSize:11,color:"var(--text-muted)",marginTop:5}}>🗑 odebere jen vás okamžitě · „Uložit" zapíše do všech dní</div>}
              </div>
              <div className="field">
                <label className="field-label">K dispozici (záloha)</label>
                {localBackup.length>0&&(<div className="tags">{localBackup.map(n=>(<span key={n} className="tag"><Avatar name={n} size={16}/>{n}<button className="tag-x" onClick={()=>setLocalBackup(lb=>lb.filter(x=>x!==n))}>✕</button></span>))}</div>)}
                <div className="field-row">
                  <div className="dropdown-wrap">
                    <input className="inp" placeholder="Jméno..." value={backupInput} onChange={e=>setBackupInput(e.target.value)} onFocus={()=>setShowBackupDrop(true)} onBlur={()=>setTimeout(()=>setShowBackupDrop(false),150)} onKeyDown={e=>{if(e.key==="Enter"&&backupInput.trim()){const ns=backupInput.split(",").map(s=>s.trim()).filter(Boolean);setLocalBackup(lb=>[...new Set([...lb,...ns])]);setBackupInput("");}}}/>
                    {showBackupDrop&&(<div className="dropdown-list">{teamWithMe.filter(n=>!localBackup.includes(n)&&n.toLowerCase().includes(backupInput.toLowerCase())).map(n=>(<div key={n} className="dropdown-item" onMouseDown={()=>{setLocalBackup(lb=>[...new Set([...lb,n])]);setBackupInput("");setShowBackupDrop(false);}}><Avatar name={n} size={20}/>{n}</div>))}</div>)}
                  </div>
                  <button className="btn-me" onClick={()=>{if(!localBackup.includes(userName))setLocalBackup(lb=>[...lb,userName]);}}>+ Já</button>
                  {isMulti&&<button className="btn-trash" onClick={async()=>{const nd={...data};for(const key of modal.keys){if(nd[key]?.backup){nd[key]={...nd[key],backup:nd[key].backup.filter(n=>n!==userName)};await persist(key,nd[key]);}}setData(nd);}}>🗑</button>}
                  {!isMulti&&localBackup.length>0&&<button className="btn-trash" onClick={()=>setLocalBackup([])}>🗑</button>}
                </div>
                {isMulti&&<div style={{fontSize:11,color:"var(--text-muted)",marginTop:5}}>🗑 odebere jen vás okamžitě · „Uložit" přidá do všech dní</div>}
              </div>
              <div className="field">
                <label className="field-label">Poznámka</label>
                <textarea className="textarea" placeholder="Volitelná poznámka..." value={noteInput} onChange={e=>setNoteInput(e.target.value)} rows={2}/>
              </div>
              <div className="modal-footer">
                <div/>
                <div style={{display:"flex",gap:8}}>
                  <button className="btn-cancel" onClick={()=>setModal(null)}>Zrušit</button>
                  <button className="btn-save" onClick={handleSave}>{isMulti?`Uložit ${modal.keys.length} dní`:"Uložit"}</button>
                </div>
              </div>
            </>
          )}
          {modalMode==="remove"&&(
            <>
              <div className="remove-actions">
                <button className="remove-sel-btn" onClick={()=>setRemoveChecked(new Set(sortedKeys.filter(k=>data[k]?.service||data[k]?.backup?.length>0)))}>Vybrat vše s daty</button>
                <button className="remove-sel-btn" onClick={()=>setRemoveChecked(new Set())}>Odznačit vše</button>
              </div>
              <div className="remove-list">
                {sortedKeys.map(k=>{
                  const[,km,kd]=k.split("-");const rec=data[k];
                  const hasData=!!(rec?.service||rec?.backup?.length>0);const checked=removeChecked.has(k);
                  return(
                    <div key={k} className={`remove-row${hasData?" has-data":""}`}>
                      <div className="remove-row-date">{parseInt(kd)}.{parseInt(km)}.</div>
                      <div className="remove-row-content">{hasData?(<>{rec.service&&<div className="remove-row-svc"><Avatar name={rec.service} size={16}/>{rec.service}</div>}{rec.backup?.length>0&&<div style={{display:"flex",gap:3}}>{rec.backup.map(n=><span key={n} className="backup-dot" style={{background:colorFor(n)}} title={n}>{n[0].toUpperCase()}</span>)}</div>}</>):(<span className="remove-row-empty">prázdný den</span>)}</div>
                      <button className={`remove-check${checked?" checked":""}`} onClick={()=>setRemoveChecked(prev=>{const nx=new Set(prev);nx.has(k)?nx.delete(k):nx.add(k);return nx;})} disabled={!hasData}>{checked?"✓":""}</button>
                    </div>
                  );
                })}
              </div>
              <div className="modal-footer">
                <div style={{fontSize:12,color:"var(--text-muted)"}}>Označeno: {removeChecked.size} dní</div>
                <div style={{display:"flex",gap:8}}>
                  <button className="btn-cancel" onClick={()=>setModal(null)}>Zrušit</button>
                  <button className="btn-danger" disabled={removeChecked.size===0} onClick={handleRemoveSelected}>🗑 Smazat {removeChecked.size>0?removeChecked.size+" dní":""}</button>
                </div>
              </div>
            </>
          )}
        </div>
      </div>
    );
  };

  return (
    <div className="root">
      {/* HEADER – sticky na mobilu, měřen přes ref */}
      <div className={`header${isMobile?" header-sticky":""}`} ref={headerRef}>
        <div className="brand">
          <div className="brand-icon"><svg width="20" height="20" viewBox="0 0 28 28" fill="none"><polyline points="2,22 8,14 13,18 20,8 26,4" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/><circle cx="26" cy="4" r="2.5" fill="#fff"/></svg></div>
          <span className="brand-name">Týmová vrba SR&BI</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <div className="nav-row">
            <button className="nav-btn" onClick={prevMonth}>‹</button>
            <span className="month-label">{MONTHS[curMonth]} {curYear}</span>
            <button className="nav-btn" onClick={nextMonth}>›</button>
            <button className="today-btn" onClick={()=>{setCurYear(today.getFullYear());setCurMonth(today.getMonth());}}>Dnes</button>
          </div>
          <div className="user-pill">
            <Avatar name={userName} size={22}/>
            <span className="user-name">{userName}</span>
            <button className="logout-btn" onClick={()=>{setLoginScreen(true);setLoginInput("");setPassInput("");setPassError(false);}}>✕</button>
          </div>
        </div>
      </div>

      {/* LEGENDA */}
      <div className="legend">
        <span><span className="legend-dot" style={{background:"#FDEAEA",border:"1px solid #F5B8BF"}}></span>Státní svátek</span>
        <span><span className="legend-dot" style={{background:"#E8F1FA",border:"1px solid #B3D0ED"}}></span>Víkend</span>
        <span><span className="legend-dot" style={{background:"#fff",border:"1.5px solid #F97316"}}></span>Nepokryto</span>
        {(saving||loading)&&<span className="status">{saving?"Ukládám…":"Načítám…"}</span>}
      </div>

      {/* TOOLBAR – sticky na mobilu těsně pod headerem */}
      <div style={isMobile?{position:"sticky",top:headerH,zIndex:99,background:"var(--bg-page)",paddingBottom:8,marginBottom:4}:{marginBottom:10}}>
        {selecting?(
          <div className="sel-toolbar">
            <div>
              <div className="sel-info">Vybráno {selectedKeys.size} {selectedKeys.size===1?"den":selectedKeys.size>=2&&selectedKeys.size<=4?"dny":"dní"}</div>
              <div className="sel-hint">Klikejte na dny pro výběr</div>
            </div>
            <button className="sel-act-btn" disabled={selectedKeys.size===0} onClick={()=>openDays([...selectedKeys])}>Upravit vybrané →</button>
            <button className="sel-cancel-btn" onClick={cancelSelection}>Zrušit</button>
          </div>
        ):(
          <div style={{display:"flex",justifyContent:"flex-end"}}>
            <button className="today-btn" style={{background:"var(--cs-blue)",color:"#fff",border:"none",padding:"0 14px",height:34,fontSize:13,fontWeight:600}} onClick={()=>setSelecting(true)}>☑ Vybrat více dní</button>
          </div>
        )}
      </div>

      {/* DESKTOP GRID */}
      {!isMobile&&(
        <>
          <div className="day-headers">{DAYS.map((dn,i)=><div key={dn} className={`day-hdr${i>=5?" we":""}`}>{dn}</div>)}</div>
          <div className="cal-grid">
            {cells.map((d,i)=>{
              if(!d)return <div key={i} style={{minHeight:76}}></div>;
              const key=toKey(curYear,curMonth,d);const type=getDayType(curYear,curMonth,d);const rec=data[key];
              const isToday=key===todayKey;const isSel=selectedKeys.has(key);
              const isPast=new Date(curYear,curMonth,d)<new Date(today.getFullYear(),today.getMonth(),today.getDate());
              const uncovered=!isSel&&type!=="holiday"&&!rec?.service;
              return(
                <div key={key} className={`cell ${type}${isToday?" today":""}${isSel?" selected":""}${uncovered?" uncovered":""}${isPast?" past":""}`} onClick={()=>handleCellClick(key)}>
                  <span className={`cell-num${isToday?" tn":type==="holiday"?" hn":type==="weekend"?" wn":""}`}>{d}</span>
                  {type==="holiday"&&!isSel&&<span className="sv-badge">SV</span>}
                  {isSel&&<span className="sel-check">✓</span>}
                  {rec?.service?(<div className="cell-svc"><Avatar name={rec.service} size={15}/><span className="cell-svc-name">{rec.service}</span></div>):(<div className="cell-empty">volný</div>)}
                  {rec?.backup?.length>0&&(<div className="cell-backups">{rec.backup.slice(0,3).map(n=>(<span key={n} className="backup-dot" style={{background:colorFor(n)}} title={n}>{n[0].toUpperCase()}</span>))}{rec.backup.length>3&&<span style={{fontSize:9,color:"#94A3B8"}}>+{rec.backup.length-3}</span>}</div>)}
                  {rec?.note&&<div style={{fontSize:9,color:"var(--text-muted)",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>💬 {rec.note}</div>}
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* MOBILE LIST */}
      {isMobile&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {Array.from({length:daysInMonth},(_,i)=>i+1).map(d=>{
            const key=toKey(curYear,curMonth,d);const type=getDayType(curYear,curMonth,d);const rec=data[key];
            const isToday=key===todayKey;const isSel=selectedKeys.has(key);
            const isPast=new Date(curYear,curMonth,d)<new Date(today.getFullYear(),today.getMonth(),today.getDate());
            const uncovered=!isSel&&type!=="holiday"&&!rec?.service;
            const dow=new Date(curYear,curMonth,d).getDay();
            const holidayName=getH(curYear)[key];const hasService=!!rec?.service;
            let borderColor="var(--border)";
            if(isSel)borderColor="var(--cs-blue)";
            else if(type==="holiday")borderColor="#F5B8BF";
            else if(uncovered)borderColor="#F97316";
            else if(hasService)borderColor="var(--cs-blue-mid)";
            let bg="var(--bg-white)";
            if(isSel)bg="var(--cs-blue-light)";
            else if(type==="holiday")bg="var(--cs-red-light)";
            else if(type==="weekend")bg="var(--cs-blue-light)";
            const dateColor=isToday?"var(--cs-blue)":type==="holiday"?"var(--cs-red)":type==="weekend"?"var(--cs-blue)":"var(--text-primary)";
            return(
              <div key={key} id={isToday?"today-row":undefined} onClick={()=>handleCellClick(key)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:12,background:bg,border:`1.5px solid ${borderColor}`,opacity:isPast?0.45:1,filter:isPast?"grayscale(30%)":"none",cursor:"pointer",boxShadow:isToday?"0 0 0 3px rgba(0,101,189,0.15)":"none"}}>
                <div style={{minWidth:44,display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
                  <span style={{fontSize:24,fontWeight:800,lineHeight:1,color:dateColor}}>{d}</span>
                  <span style={{fontSize:11,fontWeight:600,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:"0.5px",marginTop:2}}>{DOW_LABELS[dow]}</span>
                </div>
                <div style={{width:2,height:40,borderRadius:2,background:borderColor,flexShrink:0,opacity:0.5}}/>
                <div style={{flex:1,minWidth:0}}>
                  {holidayName&&<div style={{fontSize:11,fontWeight:600,color:"var(--cs-red)",marginBottom:3}}>{holidayName}</div>}
                  {hasService?(
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:rec?.backup?.length>0||rec?.note?5:0}}>
                      <Avatar name={rec.service} size={24}/>
                      <span style={{fontSize:15,fontWeight:700,color:"var(--text-primary)"}}>{rec.service}</span>
                    </div>
                  ):(
                    <span style={{fontSize:14,color:"var(--text-muted)",fontStyle:"italic"}}>volný</span>
                  )}
                  {rec?.backup?.length>0&&(
                    <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginTop:2}}>
                      <span style={{fontSize:11,color:"var(--text-muted)"}}>záloha:</span>
                      {rec.backup.map(n=>(<span key={n} style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:12,fontWeight:600,color:"var(--cs-blue)"}}><Avatar name={n} size={14}/>{n}</span>))}
                    </div>
                  )}
                  {rec?.note&&<div style={{fontSize:12,color:"var(--text-muted)",marginTop:3,fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>💬 {rec.note}</div>}
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flexShrink:0}}>
                  {isSel&&<span style={{width:22,height:22,borderRadius:"50%",background:"var(--cs-blue)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:700}}>✓</span>}
                  {!isSel&&hasService&&<span style={{width:10,height:10,borderRadius:"50%",background:"var(--cs-green)",display:"block"}}/>}
                  {!isSel&&uncovered&&type!=="holiday"&&<span style={{fontSize:16}}>⚠️</span>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {renderModal()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
